services:
  founder_radar_smoke:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      FOLLOW_BUILDERS_FEED_BASE_URL: ${FOLLOW_BUILDERS_FEED_BASE_URL}
      FOUNDER_RADAR_LANGUAGE: ${FOUNDER_RADAR_LANGUAGE}
      FOUNDER_RADAR_LLM_BASE_URL: ${FOUNDER_RADAR_LLM_BASE_URL}
      FOUNDER_RADAR_LLM_API_KEY: ${FOUNDER_RADAR_LLM_API_KEY}
      FOUNDER_RADAR_LLM_MODEL: ${FOUNDER_RADAR_LLM_MODEL}
      LARK_DOMAIN: ${LARK_DOMAIN}
      LARK_APP_ID: ${LARK_APP_ID}
      LARK_APP_SECRET: ${LARK_APP_SECRET}
      LARK_RECIPIENT_OPEN_ID: ${LARK_RECIPIENT_OPEN_ID}
    command:
      - /bin/sh
      - -lc
      - node src/cli.js smoke > /tmp/founder-radar.md && tail -f /dev/null
